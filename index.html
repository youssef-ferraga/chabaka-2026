<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة شبكة الحروف - النسخة النهائية</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .grid-container {
            border: 2px solid #000;
            padding: 1px;
            background-color: #000;
            position: relative;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 120px);
            grid-template-rows: repeat(7, 120px);
            gap: 1px;
            background-color: #000;
            direction: ltr; /* LTR is crucial for exact cell coordinates matching the image */
        }
        .cell {
            background-color: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            direction: rtl;
        }
        .gray-bg {
            background-color: #f2f2f2;
        }
        
        .main-input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 50px;
            font-weight: bold;
            background: transparent;
            outline: none;
            font-family: 'Arial', sans-serif;
            z-index: 5;
        }
        .main-input:focus { background-color: #e6f7ff; }
        .correct { background-color: #d4edda !important; }

        .tiny-num {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 13px;
            color: #333;
            font-weight: bold;
            z-index: 2;
        }

        .split-row {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #000;
            position: relative;
            font-size: 18px;
            text-align: center;
            line-height: 1.1;
            font-weight: bold;
            padding: 0 5px;
        }
        .split-row:last-child { border-bottom: none; }
        
        /* Arrows Base */
        .svg-arrow {
            position: absolute;
            z-index: 10;
            overflow: visible;
        }

        /* Portrait */
        .portrait {
            grid-row: span 2;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .portrait img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* Special Cell Bottom Left */
        .special-cell {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .sc-title {
            height: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }
        .sc-boxes {
            height: 50%;
            display: flex;
            border-top: 1px solid #000;
            direction: ltr; /* 5 to 1 LTR */
        }
        .s-box {
            flex: 1;
            border-right: 1px solid #000;
            display: flex;
            flex-direction: column;
            background-color: #f9f9f9;
        }
        .s-box:last-child { border-right: none; }
        .s-num {
            height: 40%;
            border-bottom: 1px solid #000;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #eaeaea;
        }
        .s-input {
            height: 60%;
            border: none;
            width: 100%;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            outline: none;
            background: transparent;
        }

        .btn-check {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

        function verifyAnswers() {
            for (let id in answers) {
                let inputEl = document.getElementById(id);
                if (inputEl) {
                    let cellEl = inputEl.closest(id.startsWith('b') ? '.s-box' : '.cell');
                    if (inputEl.value.trim() === answers[id]) {
                        cellEl.classList.add('correct');
                    } else {
                        cellEl.classList.remove('correct');
                    }
                }
            }
        }
